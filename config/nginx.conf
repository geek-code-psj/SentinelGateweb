server {
    listen 80;

    # Gate display tablet — http://localhost/gate/
    location /gate/ {
        alias /usr/share/nginx/html/gate/;
        try_files $uri $uri/ /gate/index.html;
    }

    # Admin dashboard — http://localhost/admin/
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Proxy API calls to Node backend
    location /api/ {
        proxy_pass         http://backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE endpoint — must disable buffering
    location /api/admin/stream {
        proxy_pass         http://backend:3001/admin/stream;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }
}
