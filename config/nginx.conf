server {
    listen 80;

    # Suppress favicon 404 errors
    location = /favicon.ico {
        return 204;
        add_header Content-Type "image/x-icon";
    }

    # Redirect root and missing paths to gate display
    location = / {
        rewrite ^/$ /gate/ redirect;
    }

    # ============================================================
    # API ROUTES (must come BEFORE SPA routes)
    # ============================================================

    # Proxy API calls to Node backend
    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Admin API endpoints
    location /admin/login {
        proxy_pass         http://backend:8080/admin/login;
        proxy_http_version 1.1;
        proxy_set_header   Content-Type application/json;
        proxy_set_header   Host $host;
    }

    location /admin/stream {
        proxy_pass         http://backend:8080/admin/stream;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location /admin/feed {
        proxy_pass         http://backend:8080/admin/feed;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host $host;
    }

    location /admin/metrics {
        proxy_pass         http://backend:8080/admin/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host $host;
    }

    location /admin/curfew {
        proxy_pass         http://backend:8080/admin/curfew;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host $host;
    }

    location /admin/geofences {
        proxy_pass         http://backend:8080/admin/geofences;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host $host;
    }

    location /admin/override {
        proxy_pass         http://backend:8080/admin/override;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host $host;
    }

    # Leave API endpoints
    location /leave/ {
        proxy_pass         http://backend:8080/leave/;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host $host;
    }

    # Gate API endpoints
    location /gate/bootstrap {
        proxy_pass         http://backend:8080/gate/bootstrap;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /gate/telemetry/ {
        proxy_pass         http://backend:8080/gate/telemetry/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ============================================================
    # SPA ROUTES (come AFTER specific API routes)
    # ============================================================

    # Gate display tablet — http://localhost/gate
    location /gate {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /gate/index.html;
    }

    # Admin dashboard — http://localhost/admin
    location /admin {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /admin/index.html;
    }
}
